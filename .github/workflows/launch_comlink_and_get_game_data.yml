name: Run swgoh-comlink container and query API /data endpoint for units collection

on:
  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
  run-container-and-query:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grant write permission for the GITHUB_TOKEN to push changes

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Create data directory # This creates the directory locally if it doesn't exist
      run: mkdir -p data

    - name: Get current date and unique ID
      id: date_id_step
      run: |
        echo "DATE_STRING=$(date +%Y-%m-%d)" >> $GITHUB_ENV
        echo "UNIQUE_ID=$(head /dev/urandom | tr -dc A-Za-z0-9 | head -c 8)" >> $GITHUB_ENV
      # This sets environment variables DATE_STRING (YYYY-MM-DD) and UNIQUE_ID (8-char alphanumeric)

    - name: Run swgoh-comlink container
      id: run-container
      run: |
        docker run -d --rm --name swgoh-comlink -p 3200:3000 --env APP_NAME=gh-action-comlink ghcr.io/swgoh-utils/swgoh-comlink:latest
        # Give the container a moment to start up
        sleep 10

    - name: Get game metadata
      run: |
        echo "MD_VERSION=$(curl -q -X POST -H 'Content-Type: application/json' -d '{}' http://localhost:3200/metadata | jq '.latestGamedataVersion')" >> $GITHUB_ENV

    - name: Execute POST request to /data and save response
      run: |
        JSON_PAYLOAD='{
          "payload": {
            "version": ${{ env.MD_VERSION }},
            "devicePlatform": "Android",
            "includePveUnits": false,
            "items": "137438953472"
          },
          "enums": false
        }'
        
        curl -X POST \
             -H "Content-Type: application/json" \
             -d "$JSON_PAYLOAD" \
             http://localhost:3200/data > data/units_response_${{ env.DATE_STRING }}_${{ env.UNIQUE_ID }}.json

    - name: Commit and push response # This action will create the 'data' folder in the repo if it's new
      uses: EndBug/add-and-commit@v10
      with:
        add: 'data/units_response_${{ env.DATE_STRING }}_${{ env.UNIQUE_ID }}.json'
        message: 'feat: Add SWGOH Guild API response for ${{ env.DATE_STRING }} (ID: ${{ env.UNIQUE_ID }})'
